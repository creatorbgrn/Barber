<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperAdmin - Edinburgh Barber</title>
  <link rel="stylesheet" href="superadmin.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body class="superadmin-body">
  <!-- Login Screen -->
  <div id="superadmin-auth-panel" class="login-screen">
    <div class="login-card">
      <h1>SuperAdmin Login</h1>
      <form id="superadmin-login-form">
        <input type="email" id="superadmin-email" placeholder="Email" required>
        <input type="password" id="superadmin-password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="superadmin-dashboard" hidden>
    <header class="header">
      <h1>SuperAdmin Dashboard</h1>
      <button id="logout-btn">Logout</button>
    </header>

    <nav class="nav">
      <button class="nav-btn active" data-section="overview">Overview</button>
      <button class="nav-btn" data-section="websites">Websites</button>
      <button class="nav-btn" data-section="analytics">Analytics</button>
      <button class="nav-btn" data-section="notifications">Notifications</button>
      <button class="nav-btn" data-section="products">Products</button>
    </nav>

    <main class="main">
      <!-- Overview Section -->
      <section id="overview-section" class="section active">
        <div class="stats-grid">
          <div class="stat-card">
            <h3>Total Websites</h3>
            <p id="total-websites">0</p>
          </div>
          <div class="stat-card">
            <h3>Active Websites</h3>
            <p id="active-websites">0</p>
          </div>
          <div class="stat-card">
            <h3>Total Bookings</h3>
            <p id="total-bookings">0</p>
          </div>
          <div class="stat-card">
            <h3>Total Revenue</h3>
            <p id="total-revenue">£0.00</p>
          </div>
        </div>
      </section>

      <!-- Websites Section -->
      <section id="websites-section" class="section">
        <h2>Website Management</h2>
        <div id="websites-list" class="websites-list">
          <!-- Websites will be loaded here -->
        </div>
      </section>

      <!-- Analytics Section -->
      <section id="analytics-section" class="section">
        <h2>Analytics</h2>
        <div class="filters">
          <select id="analytics-website">
            <option value="all">All Websites</option>
            <!-- Websites will be loaded here -->
          </select>
          <input type="date" id="analytics-start">
          <input type="date" id="analytics-end">
          <button onclick="renderAnalytics()">Filter</button>
        </div>
        <div class="charts">
          <canvas id="bookings-chart"></canvas>
          <canvas id="revenue-chart"></canvas>
        </div>
      </section>

      <!-- Notifications Section -->
      <section id="notifications-section" class="section">
        <h2>Send Notification</h2>
        <form id="notification-form">
          <select id="notification-website">
            <option value="all">All Websites</option>
            <!-- Websites will be loaded here -->
          </select>
          <input type="text" id="notification-title" placeholder="Notification Title" required>
          <textarea id="notification-message" placeholder="Notification Message" required></textarea>
          <button type="submit">Send Notification</button>
        </form>

        <h2>Recent Notifications</h2>
        <div id="notifications-list" class="notifications-list">
          <!-- Notifications will be loaded here -->
        </div>
      </section>

      <!-- Products Section -->
      <section id="products-section" class="section">
        <h2>Add Product</h2>
        <form id="product-form">
          <input type="text" id="product-name" placeholder="Product Name" required>
          <input type="number" id="product-price" step="0.01" placeholder="Price" required>
          <textarea id="product-description" placeholder="Description" required></textarea>
          <button type="submit">Add Product</button>
        </form>

        <h2>Products</h2>
        <div id="products-list" class="products-list">
          <!-- Products will be loaded here -->
        </div>
      </section>
    </main>
  </div>

  <script src="superadmin.js"></script>
</body>
</html>
